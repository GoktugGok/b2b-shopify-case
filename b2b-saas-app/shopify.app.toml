# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c3836975d68e6885f04c5c00ba3ea398"
name = "b2b-saas-app"
application_url = "https://b2b-shopify-case.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [
  "inventory_levels/update",
  "app/uninstalled",
  "app/scopes_update",
  "orders/create",
  "orders/fulfilled",
  "orders/cancelled",
  "orders/paid"
]
  uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_locations,read_orders,write_inventory,write_metaobject_definitions,write_metaobjects,write_orders,write_products,read_discounts,write_discounts,read_publications,write_publications"

[auth]
redirect_urls = [ "https://b2b-shopify-case.vercel.app/api/auth" ]

[[extensions]]
handle = "b2b-cart-discount"
type = "function"

[[extensions]]
handle = "b2b-price-block"
type = "theme"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
